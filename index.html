<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>⚽ 世界杯2026 比分预测</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1a8a4a; --green-light: #e8f5ee;
  --gold: #f0a500; --gold-light: #fff8e6;
  --red: #e24b4a; --red-light: #fff0f0;
  --blue: #2563eb; --blue-light: #eff6ff;
  --gray: #6b7280; --gray-light: #f3f4f6;
  --border: #e5e7eb; --text: #111827; --text-muted: #6b7280;
  --radius: 12px; --radius-sm: 8px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f0f4f0; color: var(--text); min-height: 100vh; }
.screen { display: none; }
.screen.active { display: block; }
#login-screen { min-height: 100vh; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a4a2e, #2d7a4f, #1a8a4a, #2d7a4f); background-size: 280% 280%; animation: bgShift 14s ease infinite; padding: 2rem; position: relative; overflow: hidden; }
#login-screen.active { display: flex; }
@keyframes bgShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
/* 背景缓缓飘浮的足球点缀 */
#login-screen::before, #login-screen::after { content: '\26BD'; position: absolute; font-size: 80px; opacity: .08; animation: floatBall 9s ease-in-out infinite; }
#login-screen::before { top: 12%; left: 10%; }
#login-screen::after { bottom: 14%; right: 12%; font-size: 120px; animation-duration: 12s; animation-direction: reverse; }
@keyframes floatBall { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-30px) rotate(180deg); } }
.login-box { position: relative; z-index: 1; background: white; border-radius: 20px; padding: 2.5rem 2rem; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: boxIn .7s cubic-bezier(.16,1,.3,1) both; }
@keyframes boxIn { from { opacity: 0; transform: translateY(28px) scale(.95); } to { opacity: 1; transform: none; } }
.login-emoji { font-size: 56px; margin-bottom: 1rem; display: inline-block; animation: ballBounce 1.7s ease-in-out infinite; }
@keyframes ballBounce { 0%,100% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(-18px) rotate(10deg); } }
.login-box h1 { font-size: 24px; font-weight: 700; line-height: 1.3; margin-bottom: .75rem; }
.login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 1.25rem; line-height: 1.6; }
.star-strip { overflow: hidden; margin: 0 -8px 1.5rem; -webkit-mask: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent); mask: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent); }
.star-track { display: flex; gap: 8px; width: max-content; animation: marquee 20s linear infinite; }
.star-strip:hover .star-track { animation-play-state: paused; }
.star-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px 6px 6px; background: var(--green-light); border-radius: 20px; font-size: 13px; white-space: nowrap; }
.star-chip .num { background: var(--green); color: #fff; font-size: 11px; font-weight: 700; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.star-chip .sflag { font-size: 15px; }
.star-chip .sname { font-weight: 600; color: var(--text); }
@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
#nickname-input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 16px; text-align: center; margin-bottom: 12px; outline: none; transition: border-color .2s; }
#nickname-input:focus { border-color: var(--green); }
#login-btn { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; }
#login-btn:hover { background: #157a3e; }
#login-btn:disabled { opacity: .7; cursor: not-allowed; }
.login-hint { font-size: 12px; color: #9ca3af; margin-top: 12px; }
header { background: var(--green); color: white; position: sticky; top: 0; z-index: 100; }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; max-width: 600px; margin: 0 auto; }
.header-title { font-size: 16px; font-weight: 600; }
.header-user { font-size: 13px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; cursor: pointer; }
.champ-badge { margin-left: 2px; font-size: 14px; }
.tab-bar { display: flex; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 49px; z-index: 99; max-width: 600px; margin: 0 auto; }
.tab-btn { flex: 1; padding: 12px 4px; border: none; background: transparent; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2.5px solid transparent; font-weight: 500; }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.content { max-width: 600px; margin: 0 auto; padding: 16px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
#sync-note { font-size: 11px; color: var(--text-muted); text-align: center; margin-bottom: 12px; }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 12px; color: var(--text-muted); cursor: pointer; }
.filter-btn.active { background: var(--green); color: white; border-color: var(--green); }
.match-card { background: white; border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.match-card.live { border-color: var(--red); border-width: 1.5px; }
.match-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.match-date { font-size: 12px; color: var(--text-muted); }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
.badge-group { background: var(--gray-light); color: var(--gray); }
.badge-live { background: var(--red-light); color: var(--red); }
.badge-done { background: var(--gray-light); color: var(--gray); }
.match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
.team { display: flex; align-items: center; gap: 8px; }
.team.right { flex-direction: row-reverse; }
.flag { font-size: 24px; }
.team-name { font-size: 14px; font-weight: 500; }
.team.right .team-name { text-align: right; }
.score-box { text-align: center; min-width: 64px; }
.real-score { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
.real-score.live { color: var(--red); }
.vs { font-size: 14px; color: #d1d5db; font-weight: 600; }
.pred-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.pred-label { font-size: 11px; color: var(--text-muted); text-align: center; margin-bottom: 8px; }
.score-input-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
.score-input { width: 56px; height: 44px; text-align: center; font-size: 20px; font-weight: 700; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--gray-light); color: var(--text); outline: none; }
.score-input:focus { border-color: var(--green); background: white; }
.score-colon { font-size: 22px; color: var(--text-muted); font-weight: 700; }
.save-btn { display: block; width: 100%; margin-top: 10px; padding: 9px; border-radius: var(--radius-sm); border: 1.5px solid var(--green); background: white; color: var(--green); font-size: 13px; font-weight: 600; cursor: pointer; }
.save-btn:hover { background: var(--green-light); }
.save-btn.saved { background: var(--green); color: white; }
.save-btn.saving { opacity: .6; pointer-events: none; }
.pred-display { text-align: center; padding: 8px 12px; background: var(--blue-light); border-radius: var(--radius-sm); margin-top: 6px; }
.pred-display .pred-score { font-size: 20px; font-weight: 700; color: var(--blue); }
.pred-display .pred-note { font-size: 11px; color: #3b82f6; margin-top: 2px; }
.result-badge { text-align: center; padding: 6px; border-radius: var(--radius-sm); margin-top: 8px; font-size: 13px; font-weight: 500; }
.result-badge.exact { background: var(--gold-light); color: #92400e; }
.result-badge.correct { background: var(--green-light); color: #166534; }
.result-badge.wrong { background: var(--red-light); color: #991b1b; }
.leaderboard-header { margin-bottom: 14px; }
.scoring-rules { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }
.scoring-rules b { color: var(--text); }
.rank-card { background: white; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
.rank-card.me { border-color: var(--green); border-width: 2px; }
.rank-card.top1 { border-color: var(--gold); background: var(--gold-light); }
.rank-num { font-size: 20px; font-weight: 700; min-width: 32px; text-align: center; color: var(--text-muted); }
.rank-num.gold { color: var(--gold); }
.rank-num.silver { color: #9ca3af; }
.rank-num.bronze { color: #b45309; }
.rank-info { flex: 1; }
.rank-name { font-size: 15px; font-weight: 600; }
.rank-champ { font-size: 11px; margin-left: 3px; vertical-align: super; white-space: nowrap; }
.rank-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.rank-score { font-size: 22px; font-weight: 700; color: var(--green); }
.rank-score-label { font-size: 11px; color: var(--text-muted); text-align: right; }
.champ-intro { text-align: center; padding: .5rem 0 1.25rem; font-size: 14px; color: var(--text-muted); }
#my-champ-display { margin-top: 8px; font-size: 18px; font-weight: 600; color: var(--text); }
#champ-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.champ-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: white; cursor: pointer; }
.champ-btn:hover { border-color: var(--green); }
.champ-btn.picked { border-color: var(--green); border-width: 2px; background: var(--green-light); }
.champ-flag { font-size: 26px; }
.champ-name { font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.3; }
.champ-btn.picked .champ-name { color: var(--green); font-weight: 600; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-box { background: white; border-radius: var(--radius-sm); padding: 12px; text-align: center; border: 1px solid var(--border); }
.stat-val { font-size: 22px; font-weight: 700; color: var(--green); }
.stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.pick-item { background: white; border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.pick-flags { font-size: 18px; white-space: nowrap; }
.pick-match { flex: 1; font-size: 13px; }
.pick-score { font-size: 16px; font-weight: 700; color: var(--blue); min-width: 36px; text-align: center; }
.pick-result { font-size: 18px; }
.loading { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 14px; line-height: 1.8; }
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }
.social { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 6px; }
.social > summary { list-style: none; cursor: pointer; font-size: 12px; color: var(--text-muted); text-align: center; padding: 5px; user-select: none; }
.social > summary::-webkit-details-marker { display: none; }
.social > summary:hover { color: var(--green); }
.social[open] > summary { color: var(--green); font-weight: 600; }
.social-body { padding-top: 10px; }
.vote-bar { display: flex; height: 26px; border-radius: 6px; overflow: hidden; margin-bottom: 6px; }
.vote-seg { display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 700; min-width: 18px; }
.vote-seg.home { background: var(--blue); }
.vote-seg.draw { background: var(--gray); }
.vote-seg.away { background: var(--red); }
.vote-legend { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 10px; gap: 4px; }
.watch-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.watch-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 6px 10px; background: var(--gray-light); border-radius: 6px; }
.watch-item .wname { flex: 1; }
.watch-item .wscore { font-weight: 700; color: var(--blue); }
.locked { text-align: center; font-size: 12px; color: var(--text-muted); padding: 12px; background: var(--gray-light); border-radius: 6px; margin-bottom: 12px; }
.cmt-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 8px; }
.cmt { font-size: 13px; line-height: 1.4; word-break: break-word; }
.cmt b { color: var(--green); margin-right: 5px; }
.cmt-empty { font-size: 12px; color: var(--text-muted); text-align: center; padding: 6px; }
.cmt-form { display: flex; gap: 6px; }
.cmt-input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; min-width: 0; }
.cmt-input:focus { border-color: var(--green); }
.cmt-send { padding: 8px 14px; border: none; background: var(--green); color: white; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
@media (max-width: 380px) { #champ-grid { grid-template-columns: repeat(3, 1fr); } .team-name { font-size: 12px; } }
</style>
</head>

<script>
// ── Supabase 配置 ──
const SUPA_URL = "https://barycigzjfilerlvhgbx.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhcnljaWd6amZpbGVybHZoZ2J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODgxMDAsImV4cCI6MjA5NzE2NDEwMH0.HCEjC8JZ3kAT1jD0Z0yN8Fs5inyz4B7YvNT_bn18Jjk";
const SUPA_HEADERS = {
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Content-Type': 'application/json'
};

// 带超时的 fetch：超过 8 秒自动放弃，绝不无限挂起
async function fetchTimeout(url, opts = {}, ms = 8000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    return await fetch(url, { ...opts, signal: ctrl.signal });
  } finally {
    clearTimeout(timer);
  }
}

async function dbGet(nickname) {
  const r = await fetchTimeout(
    SUPA_URL + '/rest/v1/predictions?nickname=eq.' + encodeURIComponent(nickname) + '&select=*',
    { headers: SUPA_HEADERS }
  );
  if (!r.ok) throw new Error('读取失败 ' + r.status);
  const rows = await r.json();
  return rows[0] || null;
}

async function dbSave(nickname, predictions, champion) {
  const r = await fetchTimeout(
    SUPA_URL + '/rest/v1/predictions',
    {
      method: 'POST',
      headers: { ...SUPA_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({
        nickname,
        predictions: JSON.stringify(predictions),
        champion: champion || '',
        updated_at: new Date().toISOString()
      })
    }
  );
  if (!r.ok) throw new Error('保存失败 ' + r.status);
}

async function dbListAll() {
  const r = await fetchTimeout(
    SUPA_URL + '/rest/v1/predictions?select=*',
    { headers: SUPA_HEADERS }
  );
  if (!r.ok) throw new Error('排行榜加载失败 ' + r.status);
  return r.json();
}

async function dbGetAllComments() {
  const r = await fetchTimeout(
    SUPA_URL + '/rest/v1/comments?select=*&order=created_at.asc',
    { headers: SUPA_HEADERS }
  );
  if (!r.ok) throw new Error('评论加载失败 ' + r.status);
  return r.json();
}

async function dbAddComment(matchId, nickname, text) {
  const r = await fetchTimeout(
    SUPA_URL + '/rest/v1/comments',
    {
      method: 'POST',
      headers: { ...SUPA_HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ match_id: matchId, nickname, text })
    }
  );
  if (!r.ok) throw new Error('发送失败 ' + r.status);
}

// ── 赛程数据 ──
// 数据来源：ESPN / CBS Sports 2026世界杯赛程赛果，截至北京时间2026/6/16
// rhs/ras = 主队/客队最终比分；status: done已结束 / live进行中 / upcoming未开始
const matches = [
  // —— 第1轮（6/11-6/17）——
  {id:'m1', date:'6/11',home:'墨西哥',hf:'&#x1F1F2;&#x1F1FD;',away:'南非',af:'&#x1F1FF;&#x1F1E6;',group:'A',rhs:2,ras:0,status:'done'},
  {id:'m2', date:'6/11',home:'韩国',hf:'&#x1F1F0;&#x1F1F7;',away:'捷克',af:'&#x1F1E8;&#x1F1FF;',group:'A',rhs:2,ras:1,status:'done'},
  {id:'m3', date:'6/12',home:'美国',hf:'&#x1F1FA;&#x1F1F8;',away:'巴拉圭',af:'&#x1F1F5;&#x1F1FE;',group:'D',rhs:4,ras:1,status:'done'},
  {id:'m4', date:'6/12',home:'加拿大',hf:'&#x1F1E8;&#x1F1E6;',away:'波黑',af:'&#x1F1E7;&#x1F1E6;',group:'B',rhs:1,ras:1,status:'done'},
  {id:'m5', date:'6/13',home:'澳大利亚',hf:'&#x1F1E6;&#x1F1FA;',away:'土耳其',af:'&#x1F1F9;&#x1F1F7;',group:'D',rhs:2,ras:0,status:'done'},
  {id:'m6', date:'6/13',home:'巴西',hf:'&#x1F1E7;&#x1F1F7;',away:'摩洛哥',af:'&#x1F1F2;&#x1F1E6;',group:'C',rhs:1,ras:1,status:'done'},

// 从公开数据源自动同步真实比分（openfootball，经 jsDelivr CDN，国内可访问、无需密钥）
// 数据约每日更新；同步失败时保留内置数据，不影响使用
const SCORE_FEED = 'https://cdn.jsdelivr.net/gh/openfootball/worldcup.json@master/2026/worldcup.json';
async function syncRealScores() {
  const note = document.getElementById('sync-note');
  try {
    const r = await fetchTimeout(SCORE_FEED, {}, 8000);
    if (!r.ok) throw new Error('feed ' + r.status);
    const data = await r.json();
    const feed = {};
    (data.matches || []).forEach(fm => {
      const ft = fm.score && fm.score.ft;
      if (Array.isArray(ft) && ft.length === 2) feed[fm.team1 + '|' + fm.team2] = ft;
    });
    let changed = 0;
    matches.forEach(m => {
      const en1 = TEAM_EN[m.home], en2 = TEAM_EN[m.away];
      if (!en1 || !en2) return;
      let ft = feed[en1 + '|' + en2], swap = false;
      if (!ft) { ft = feed[en2 + '|' + en1]; swap = !!ft; }
      if (!ft) return;
      const h = swap ? ft[1] : ft[0], a = swap ? ft[0] : ft[1];
      if (m.rhs !== h || m.ras !== a || m.status !== 'done') {
        m.rhs = h; m.ras = a; m.status = 'done'; changed++;
      }
    });
    if (changed > 0) { renderMatches(); }
    if (note) note.textContent = '⚽ 比分已同步真实数据 · ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) + ' 更新';
  } catch (e) {
    if (note) note.textContent = '⚽ 比分为内置数据（实时同步暂不可用）';
  }
}

// 防 XSS：留言/昵称里的特殊字符转义
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// 加载社交数据：所有人的预测 + 所有留言（两者互不影响，任一失败不拖累另一个）
async function loadSocialData() {
  try {
    const rows = await dbListAll();
    allPredsCache = rows.map(r => {
      let p = {};
      try { p = JSON.parse(r.predictions) || {}; } catch {}
      return { nickname: r.nickname, preds: p };
    });
  } catch (e) { /* 预测加载失败保留旧缓存 */ }
  try {
    const cmts = await dbGetAllComments();
    commentsCache = {};
    cmts.forEach(c => { (commentsCache[c.match_id] = commentsCache[c.match_id] || []).push(c); });
  } catch (e) { /* 留言表不存在或加载失败，留言区留空 */ }
}

// 按比赛聚合所有人的预测
function matchAgg(mid) {
  const list = []; let home = 0, draw = 0, away = 0;
  (allPredsCache || []).forEach(u => {
    const p = u.preds[mid];
    if (!p || typeof p.h !== 'number' || typeof p.a !== 'number') return;
    list.push({ name: u.nickname, h: p.h, a: p.a });
    const o = getOutcome(p.h, p.a);
    if (o === 'home') home++; else if (o === 'draw') draw++; else away++;
  });
  return { list, home, draw, away, total: list.length };
}

// ── 算分 ──
function getOutcome(h, a) { return h > a ? 'home' : a > h ? 'away' : 'draw'; }
function calcScore(preds) {
  let exact = 0, correct = 0;
  matches.forEach(m => {
    const p = preds[m.id];
    if (!p || m.rhs === null || m.ras === null) return;
    if (p.h === m.rhs && p.a === m.ras) exact++;
    else if (getOutcome(p.h, p.a) === getOutcome(m.rhs, m.ras)) correct++;
  });
  return { exact, correct, total: exact * 3 + correct };
}

window.changeUser = function() {
  if (!confirm('切换用户？数据已保存云端，下次用相同昵称可恢复。')) return;
  localStorage.removeItem('wc_nickname');
  currentUser = null; userPreds = {}; userChampion = null;
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('nickname-input').value = '';
};

window.enterApp = function() {
  const input = document.getElementById('nickname-input');
  const name = input.value.trim();
  if (!name || name.length < 2) { input.focus(); input.style.borderColor = '#e24b4a'; return; }
  input.style.borderColor = '';
  localStorage.setItem('wc_nickname', name);
  currentUser = name;
  // 立刻进入 app，绝不等待网络
  goToMain(name);
  // 后台加载云端数据，成功后刷新界面
  loadUserData()
    .then(() => { updateHeaderUser(); renderMatches(); renderChampion(); renderMyPicks(); })
    .catch(() => showToast('云端数据加载失败，已用空白进入'));
};

// ── 渲染：单场社交区（围观预测 + 氛围统计 + 留言）──
function renderSocialSection(m) {
  const started = m.status === 'live' || m.status === 'done';
  const agg = matchAgg(m.id);
  const cmts = commentsCache[m.id] || [];
  const hasFinal = m.rhs !== null && m.ras !== null;

  let body = '<div class="social-body">';

  // 预测揭晓 / 氛围统计
  if (!started) {
    body += '<div class="locked">&#x1F512; 开赛后揭晓大家的预测（已有 ' + agg.total + ' 人预测）</div>';
  } else if (agg.total > 0) {
    body += '<div class="vote-bar">'
      + (agg.home ? '<div class="vote-seg home" style="flex:' + agg.home + '">' + agg.home + '</div>' : '')
      + (agg.draw ? '<div class="vote-seg draw" style="flex:' + agg.draw + '">' + agg.draw + '</div>' : '')
      + (agg.away ? '<div class="vote-seg away" style="flex:' + agg.away + '">' + agg.away + '</div>' : '')
      + '</div>'
      + '<div class="vote-legend"><span>&#x1F535; ' + m.home + '赢 ' + agg.home + '</span><span>&#x26AA; 平 ' + agg.draw + '</span><span>&#x1F534; ' + m.away + '赢 ' + agg.away + '</span></div>'
      + '<div class="watch-list">' + agg.list.map(p => {
          let icon = '';
          if (hasFinal) {
            if (p.h === m.rhs && p.a === m.ras) icon = '&#x1F3AF;';
            else if (getOutcome(p.h, p.a) === getOutcome(m.rhs, m.ras)) icon = '&#x2705;';
            else icon = '&#x274C;';
          }
          const me = p.name === currentUser ? ' &#x1F448;' : '';
          return '<div class="watch-item"><span class="wname">' + escapeHtml(p.name) + me + '</span><span class="wscore">' + p.h + ':' + p.a + '</span><span>' + icon + '</span></div>';
        }).join('') + '</div>';
  } else {
    body += '<div class="locked">还没有人预测这场</div>';
  }

  // 留言墙
  body += '<div class="cmt-list" id="cmt-list-' + m.id + '">';
  if (cmts.length) {
    body += cmts.map(c => '<div class="cmt"><b>' + escapeHtml(c.nickname) + '</b>' + escapeHtml(c.text) + '</div>').join('');
  } else {
    body += '<div class="cmt-empty">还没人聊，来说两句 &#x1F447;</div>';
  }
  body += '</div>'
    + '<div class="cmt-form"><input class="cmt-input" id="cmt-input-' + m.id + '" maxlength="80" placeholder="说点什么...">'
    + '<button class="cmt-send" onclick="submitComment(\'' + m.id + '\')">发送</button></div>';

  body += '</div>';

  return '<details class="social"><summary>&#x1F465; 大家的预测 (' + agg.total + ') · &#x1F4AC; ' + cmts.length + '</summary>' + body + '</details>';
}

window.submitComment = async function(mid) {
  const input = document.getElementById('cmt-input-' + mid);
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  input.disabled = true;
  try {
    await dbAddComment(mid, currentUser, text);
    (commentsCache[mid] = commentsCache[mid] || []).push({ match_id: mid, nickname: currentUser, text });
    const listEl = document.getElementById('cmt-list-' + mid);
    const empty = listEl.querySelector('.cmt-empty');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'cmt';
    div.innerHTML = '<b>' + escapeHtml(currentUser) + '</b>' + escapeHtml(text);
    listEl.appendChild(div);
    input.value = '';
    showToast('已发送');
  } catch (e) {
    showToast('发送失败，请重试');
  } finally {
    input.disabled = false;
    input.focus();
  }
};

// ── 渲染：赛程 ──
function renderMatches() {
  const list = matches.filter(m => currentFilter === 'all' || m.status === currentFilter);
  const c = document.getElementById('matches-list');
  if (!list.length) { c.innerHTML = '<div class="empty">暂无比赛</div>'; return; }
  c.innerHTML = list.map(m => {
    const pred = userPreds[m.id];
    const hasFinal = m.rhs !== null && m.ras !== null;
    let scoreHTML = m.status === 'done' && hasFinal
      ? '<div class="real-score">' + m.rhs + ':' + m.ras + '</div>'
      : m.status === 'live'
      ? '<div class="real-score live">?:?</div><div style="font-size:10px;color:#e24b4a;margin-top:3px">&#x1F534; 进行中</div>'
      : '<div class="vs">VS</div>';
    let metaBadges = '<span class="badge badge-group">组' + m.group + '</span>';
    if (m.status === 'live') metaBadges += '<span class="badge badge-live">&#x1F534; 进行中</span>';
    if (m.status === 'done') metaBadges += '<span class="badge badge-done">已结束</span>';
    let predHTML = '';
    if (m.status === 'done') {
      if (pred) {
        const exact = hasFinal && pred.h === m.rhs && pred.a === m.ras;
        const res = hasFinal && getOutcome(pred.h, pred.a) === getOutcome(m.rhs, m.ras);
        predHTML = '<div class="pred-section"><div class="pred-display"><div class="pred-score">' + pred.h + ':' + pred.a + '</div><div class="pred-note">你的预测</div></div>'
          + (hasFinal ? (exact ? '<div class="result-badge exact">&#x1F3AF; 完全猜中！+3分</div>' : res ? '<div class="result-badge correct">&#x2705; 猜中胜负 +1分</div>' : '<div class="result-badge wrong">&#x274C; 没猜中，继续加油</div>') : '')
          + '</div>';
      } else {
        predHTML = '<div class="pred-section"><div class="pred-display" style="background:var(--gray-light)"><div class="pred-note" style="color:var(--text-muted)">未预测此场</div></div></div>';
      }
    } else {
      const saved = !!pred;
      predHTML = '<div class="pred-section"><div class="pred-label">&#x1F3AF; 预测比分</div>'
        + '<div class="score-input-row">'
        + '<input class="score-input" id="ph-' + m.id + '" type="number" min="0" max="20" value="' + (pred ? pred.h : '') + '" placeholder="0">'
        + '<span class="score-colon">:</span>'
        + '<input class="score-input" id="pa-' + m.id + '" type="number" min="0" max="20" value="' + (pred ? pred.a : '') + '" placeholder="0">'
        + '</div>'
        + '<button class="save-btn ' + (saved ? 'saved' : '') + '" id="savebtn-' + m.id + '" onclick="savePred(\'' + m.id + '\')">'
        + (saved ? '&#x2705; 已保存，点击修改' : '确认预测')
        + '</button></div>';
    }
    return '<div class="match-card ' + (m.status === 'live' ? 'live' : '') + '">'
      + '<div class="match-meta"><span class="match-date">' + m.date + '</span>' + metaBadges + '</div>'
      + '<div class="match-teams">'
      + '<div class="team"><span class="flag">' + m.hf + '</span><span class="team-name">' + m.home + '</span></div>'
      + '<div class="score-box">' + scoreHTML + '</div>'
      + '<div class="team right"><span class="team-name">' + m.away + '</span><span class="flag">' + m.af + '</span></div>'
      + '</div>' + predHTML + renderSocialSection(m) + '</div>';
  }).join('');
}

window.savePred = async function(mid) {
  const h = parseInt(document.getElementById('ph-' + mid).value);
  const a = parseInt(document.getElementById('pa-' + mid).value);
  if (isNaN(h) || isNaN(a) || h < 0 || a < 0) { showToast('请填入完整比分'); return; }
  const btn = document.getElementById('savebtn-' + mid);
  btn.classList.add('saving'); btn.textContent = '保存中...';
  try {
    userPreds[mid] = { h, a };
    await saveUserData();
    btn.classList.remove('saving'); btn.classList.add('saved');
    btn.innerHTML = '&#x2705; 已保存，点击修改';
    showToast('保存成功！');
  } catch (e) {
    delete userPreds[mid];
    btn.classList.remove('saving'); btn.textContent = '重试保存';
    showToast('保存失败，请重试');
  }
};

// ── 渲染：排行榜 ──
async function renderLeaderboard() {
  const c = document.getElementById('leaderboard-list');
  c.innerHTML = '<div class="loading">加载排行榜...</div>';
  try {
    const rows = await dbListAll();
    if (!rows.length) { c.innerHTML = '<div class="empty">还没有人预测，快去填写吧！</div>'; return; }
    const users = rows.map(row => {
      let preds = {};
      try { preds = JSON.parse(row.predictions) || {}; } catch {}
      return { name: row.nickname, champion: row.champion || '', ...calcScore(preds) };
    });
    users.sort((a, b) => b.total - a.total || b.exact - a.exact);
    const medals = ['&#x1F947;', '&#x1F948;', '&#x1F949;'];
    c.innerHTML = users.map((u, i) => {
      const isMe = u.name === currentUser;
      const nc = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const ct = u.champion ? champTeams.find(x => x.n === u.champion) : null;
      const champBadge = ct ? '<sup class="rank-champ" title="押冠军：' + u.champion + '">&#x1F3C6;' + ct.f + '</sup>' : '';
      return '<div class="rank-card ' + (isMe ? 'me ' : '') + (i === 0 ? 'top1' : '') + '">'
        + '<div class="rank-num ' + nc + '">' + (medals[i] || (i + 1)) + '</div>'
        + '<div class="rank-info"><div class="rank-name">' + escapeHtml(u.name) + champBadge + (isMe ? ' &#x1F448;' : '') + '</div>'
        + '<div class="rank-detail">&#x1F3AF; ' + u.exact + '场完全猜中 &nbsp;&#x2705; ' + u.correct + '场猜中胜负</div></div>'
        + '<div><div class="rank-score">' + u.total + '</div><div class="rank-score-label">分</div></div></div>';
    }).join('');
  } catch (e) {
    c.innerHTML = '<div class="empty">加载失败，请刷新重试</div>';
  }
}

// ── 渲染：冠军 ──
function renderChampion() {
  const display = document.getElementById('my-champ-display');
  if (userChampion) {
    const t = champTeams.find(x => x.n === userChampion);
    display.innerHTML = '你选了 ' + (t ? t.f : '') + ' ' + userChampion + ' &#x1F3C6;';
  } else display.textContent = '还没选，快来选！';
  document.getElementById('champ-grid').innerHTML = champTeams.map(t =>
    '<button class="champ-btn ' + (userChampion === t.n ? 'picked' : '') + '" onclick="pickChampion(\'' + t.n + '\')">'
    + '<span class="champ-flag">' + t.f + '</span><span class="champ-name">' + t.n + '</span></button>'
  ).join('');
}

window.pickChampion = async function(name) {
  userChampion = name;
  try {
    await saveUserData(); renderChampion(); updateHeaderUser(); showToast('已选 ' + name + ' 为冠军！');
  } catch (e) {
    showToast('保存失败，请重试');
  }
};

// ── 渲染：我的预测 ──
function renderMyPicks() {
  const score = calcScore(userPreds);
  const total = Object.keys(userPreds).length;
  document.getElementById('my-stats').innerHTML =
    '<div class="stat-box"><div class="stat-val">' + total + '</div><div class="stat-lbl">已预测</div></div>'
    + '<div class="stat-box"><div class="stat-val" style="color:#f0a500">' + score.exact + '</div><div class="stat-lbl">&#x1F3AF; 完全猜中</div></div>'
    + '<div class="stat-box"><div class="stat-val">' + score.total + '</div><div class="stat-lbl">总分</div></div>';
  if (!total) { document.getElementById('my-picks-list').innerHTML = '<div class="empty">去"赛程"填入你的比分预测吧 &#x26BD;</div>'; return; }
  document.getElementById('my-picks-list').innerHTML = Object.entries(userPreds).map(([mid, p]) => {
    const m = matches.find(x => x.id === mid); if (!m) return '';
    const hasFinal = m.rhs !== null && m.ras !== null;
    let icon = '';
    if (hasFinal) {
      if (p.h === m.rhs && p.a === m.ras) icon = '&#x1F3AF;';
      else if (getOutcome(p.h, p.a) === getOutcome(m.rhs, m.ras)) icon = '&#x2705;';
      else icon = '&#x274C;';
    }
    return '<div class="pick-item"><span class="pick-flags">' + m.hf + ' ' + m.af + '</span>'
      + '<span class="pick-match">' + m.home + ' vs ' + m.away + '</span>'
      + '<span class="pick-score">' + p.h + ':' + p.a + '</span>'
      + '<span class="pick-result">' + icon + '</span></div>';
  }).join('');
}

// ── 自动登录 ──
const savedName = localStorage.getItem('wc_nickname');
if (savedName) {
  currentUser = savedName;
  // 立刻进入，后台再补数据
  goToMain(savedName);
  loadUserData()
    .then(() => { updateHeaderUser(); renderMatches(); renderChampion(); renderMyPicks(); })
